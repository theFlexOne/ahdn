apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: image-converter
spec:
  template:
    spec:
      containerConcurrency: 1
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/REPO/image-converter:latest
          env:
            - name: PORT
              value: "8080"
            - name: MAX_UPLOAD_BYTES
              value: "20971520"
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
